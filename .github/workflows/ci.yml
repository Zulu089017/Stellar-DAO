name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts -> target

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Soroban contracts are pinned to `soroban-sdk = =21.7.7` (the
      # final 21.x release) — see `contracts/Cargo.toml` for the
      # rationale (22.x bumps ed25519-dalek v3 + ChaCha20Rng break the
      # rand_core trait chain, and the contract source uses the pre-22
      # API surface). The three crates below are now gating CI:
      #   cargo check enforces the SDK absorbs the source unchanged
      #   cargo test --no-run enforces host-side test compilation
      #   cargo build --target wasm32-unknown-unknown --release
      #     enforces the WASM artefact ships from current source.
      - name: Cargo check (Soroban contracts)
        working-directory: contracts
        run: cargo check --workspace --lib --bins

      - name: Cargo test compile (Soroban contracts)
        working-directory: contracts
        run: cargo test --workspace --no-run

      - name: Build (WASM — Soroban contracts)
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release --workspace

      - name: Build (Node bundles)
        run: pnpm build
